server {
    listen 9080;
    listen [::]:9080;
    server_name quizkid.navi-services.com;

    return 301 https://$host:9443$request_uri;
}

server {
    listen 9443 ssl http2;
    listen [::]:9443 ssl http2;
    server_name quizkid.navi-services.com;

    ssl_certificate /etc/letsencrypt/live/quizkid.navi-services.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/quizkid.navi-services.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
